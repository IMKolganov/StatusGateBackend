[pytest]
testpaths = tests
pythonpath = .
markers =
    integration: requires PostgreSQL (docker compose db)
filterwarnings =
    ignore::DeprecationWarning
    ignore:.*httpx.*TestClient.*:starlette.testclient.StarletteDeprecationWarning
    ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning:slowapi
    ignore::ResourceWarning
